<div [style.margin-left.px]="(per().birthYear * per().scale)"
     [style.width.px]="(per().age * per().scale)"
     class="time-line"
     style="border-top: 5px solid hsl(188, 52%, 42%);">
  <span class="person-name">
    <span class="name">{{ per().name }}</span>
    <span class="age">(age {{ per().age }})</span>
  </span>
  <div class="detail-info" appKeepInViewport>
    <div class="header">{{ per().name }}</div>
    <div>Born: {{ per().birthYear }}<span class="era">AM</span></div>
    <div>Died: {{ getDeathYear() }}<span class="era">AM</span></div>
    <div>Age: {{ per().age }}</div>
    @if (per().reference) {
      <div>Reference:</div>
      <div>
        <app-verse [data]="per().reference"/>
      </div>
    }
    @if (per().note) {
      <div>Note:</div>
      <div class="person-note">{{ per().note }}</div>
    }
  </div>
</div>
