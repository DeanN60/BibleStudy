<div [style.margin-left.px]="(per().birthYear * per().scale)"
     [style.width.px]="(per().age * per().scale)"
     class="time-line"
     style="border-top: 5px solid hsl(188, 52%, 42%);">
  <span class="person-name">
    <span class="name">{{ per().name }}</span>
    <span class="age">(age {{ per().age }})</span>
  </span>
  <div class="detail-info">
    <div class="header">{{ per().name }}</div>
    <div>Born: {{ per().birthYear }} AM</div>
    <div>Died: {{ getDeathYear() }} AM</div>
    <div>Age: {{ per().age }}</div>
    @if (per().reference) {
      <div>
        Reference:
        <app-verse [data]="per().reference"/>
      </div>
    }
  </div>
</div>
