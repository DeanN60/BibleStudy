  <div class="page-content">
    <p>
      The Bible does not use the word &quot;Trinity&quot;.
      The word "Trinity" is a word that we use to define the Godhead as we understand it.
    </p>
    <p>
      The Bible does talk about God the Father, God the Son and God the Holy Spirit.
    </p>
    <p>
      There is only one God, yet three personages.
    </p>
    <app-verse [data]="john_1_1_5"/>
