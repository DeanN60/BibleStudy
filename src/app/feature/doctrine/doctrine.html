<div class="page-content-container">
  <app-doctrine-sub-menu/>

  <div class="page-content">
    <h1>Doctrine</h1>

    <app-verse
      [data]=iiTimothy3_16_17
    />

    <div>
      Doctrine helps us establish known facts about God and His word.
      Doctrine is a set of principles that are based on Scripture.
      <ul>
        <li>Resurrection</li>
        <li>Trinity</li>
      </ul>
    </div>

    <div>
      All doctrine must be tested by Scripture.
      We never test Scripture by doctrine because doctrine may be corrupt.
    </div>
  </div>
</div>
