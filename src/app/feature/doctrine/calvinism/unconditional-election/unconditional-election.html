  <div class="page-content">
    <p>
      God chose us. We did not chose Him.
    </p>

    <p>
      <app-verse [data]="rom_9_11_16"/>
      says that God will chose whom He wishes.
    </p>

    <p>
      <app-verse [data]="eph_1_1_11"/>
      says that we were elected before creation.
    </p>

    <p>
      <app-verse [data]="iiTim_1_9"/>
      says that God called us with a Holy calling.
    </p>

    <p>
      <app-verse [data]="john_6_37"/>
      says that we were chosen by God.
    </p>

    <p>
      <app-verse [data]="john_15_16"/>
      says that we did not chose Him, but He chose us.
    </p>
  </div>
