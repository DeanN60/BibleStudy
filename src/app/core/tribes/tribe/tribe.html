<div class="tribe-container">
  <div><b>Name:</b> {{ name() }}</div>
  <div>
    <select name=name() id=name()>
      @for (meaning of this.meanings; track meaning) {
        <option value=meaning>{{ meaning }}</option>
      }
    </select>
  </div>
  @if (this.standard) {
    <div class="standard">
      <b>Standard:</b> {{ this.standard }}
    </div>
  }
</div>
